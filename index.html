<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酔い度チェッカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: white;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      padding: 30px 24px;
      text-align: center;
    }

    .screen.active { display: flex; }

    /* タイトル画面 */
    .title-emoji { font-size: 80px; margin-bottom: 20px; }
    .title-text  { font-size: 32px; font-weight: bold; color: #f9ca24; margin-bottom: 10px; }
    .title-sub   { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 40px; line-height: 1.6; }

    .btn {
      padding: 16px 48px;
      border-radius: 50px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 8px;
    }

    .btn-primary { background: #f9ca24; color: #1a1a2e; }
    .btn-primary:active { opacity: 0.8; }

    /* テスト共通 */
    .test-title {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .test-step {
      font-size: 13px;
      color: #f9ca24;
      margin-bottom: 30px;
    }

    .progress-bar {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #f9ca24;
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* 計算テスト */
    .calc-question {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #f9ca24;
    }

    .calc-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }

    .calc-btn {
      padding: 20px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .calc-btn:active { background: rgba(255,255,255,0.3); }

    /* 反応速度テスト */
    .reaction-area {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 3px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      margin: 20px 0;
      transition: background 0.1s;
    }

    .reaction-area.ready {
      background: #e74c3c;
      border-color: #e74c3c;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    .reaction-area.go {
      background: #2ecc71;
      border-color: #2ecc71;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    .reaction-time {
      font-size: 48px;
      font-weight: bold;
      color: #f9ca24;
      margin: 10px 0;
    }

    /* バランステスト */
    .balance-display {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      position: relative;
      margin: 20px 0;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }

    .balance-ball {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f9ca24;
      position: absolute;
      transform: translate(-50%, -50%);
      transition: left 0.05s, top 0.05s;
      left: 50%;
      top: 50%;
    }

    .balance-center {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .balance-timer {
      font-size: 48px;
      font-weight: bold;
      color: #f9ca24;
    }

    .balance-status {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      margin-top: 10px;
    }

    /* 結果画面 */
    .result-char { font-size: 100px; margin-bottom: 10px; }
    .result-level {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #f9ca24;
    }
    .result-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.7;
      margin-bottom: 30px;
      max-width: 280px;
    }
    .result-score {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }

    .result-meter {
      width: 280px;
      height: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .result-meter-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 1s ease-out;
    }
  </style>
</head>
<body>

  <!-- タイトル画面 -->
  <div class="screen active" id="screen-title">
    <div class="title-emoji">🍺</div>
    <div class="title-text">酔い度チェッカー</div>
    <div class="title-sub">3つのテストであなたの<br>酔い度を診断します！</div>
    <button class="btn btn-primary" onclick="startTest()">診断スタート</button>
  </div>

  <!-- 計算テスト -->
  <div class="screen" id="screen-calc">
    <div class="test-title">TEST 1 / 3</div>
    <div class="test-step">🧮 計算テスト</div>
    <div class="progress-bar"><div class="progress-fill" style="width:33%"></div></div>
    <div class="calc-question" id="calcQuestion">12 + 7 = ?</div>
    <div id="calcFeedback" style="font-size:20px; height:30px; margin-bottom:10px;"></div>
    <div class="calc-options" id="calcOptions"></div>
  </div>

  <!-- 反応速度テスト -->
  <div class="screen" id="screen-reaction">
    <div class="test-title">TEST 2 / 3</div>
    <div class="test-step">⚡ 反応速度テスト</div>
    <div class="progress-bar"><div class="progress-fill" style="width:66%"></div></div>
    <div style="font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:10px;">緑になったらすぐタップ！</div>
    <div class="reaction-area" id="reactionArea" onclick="reactionTap()">待機中...</div>
    <div class="reaction-time" id="reactionTime"></div>
    <div id="reactionStatus" style="font-size:14px; color:rgba(255,255,255,0.6);"></div>
  </div>

  <!-- バランステスト -->
  <div class="screen" id="screen-balance">
    <div class="test-title">TEST 3 / 3</div>
    <div class="test-step">⚖️ バランステスト</div>
    <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
    <div style="font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:6px;">スマホを水平に保ってください</div>
    <div class="balance-display" id="balanceDisplay">
      <div class="balance-center"></div>
      <div class="balance-ball" id="balanceBall"></div>
    </div>
    <div class="balance-timer" id="balanceTimer">5</div>
    <div class="balance-status" id="balanceStatus">スタートボタンを押してください</div>
    <button class="btn btn-primary" id="balanceStartBtn" onclick="startBalance()" style="margin-top:16px;">スタート</button>
  </div>

  <!-- 結果画面 -->
  <div class="screen" id="screen-result">
    <div class="result-char" id="resultChar">😊</div>
    <div class="result-level" id="resultLevel">ほろ酔い</div>
    <div class="result-meter">
      <div class="result-meter-fill" id="resultMeterFill" style="width:0%"></div>
    </div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-score" id="resultScore"></div>
    <button class="btn btn-primary" onclick="restart()">もう一度</button>
  </div>

  <script>
    // スコア管理
    let scores = { calc: 0, reaction: 0, balance: 0 };

    // ===== タイトル =====
    function startTest() {
      showScreen('screen-calc');
      setupCalc();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ===== 計算テスト =====
    let calcCorrect = 0;
    let calcTotal   = 5;
    let calcCurrent = 0;
    let calcAnswer  = 0;

    function setupCalc() {
      calcCorrect = 0;
      calcCurrent = 0;
      nextCalc();
    }

    function nextCalc() {
      if (calcCurrent >= calcTotal) {
        scores.calc = calcCorrect / calcTotal;
        showScreen('screen-reaction');
        setupReaction();
        return;
      }

      const a = Math.floor(Math.random() * 20) + 1;
      const b = Math.floor(Math.random() * 20) + 1;
      const ops = ['+', '-'];
      const op  = ops[Math.floor(Math.random() * ops.length)];
      calcAnswer = op === '+' ? a + b : a - b;

      document.getElementById('calcQuestion').textContent =
        `${a} ${op} ${b} = ?`;
      document.getElementById('calcFeedback').textContent = '';

      // 選択肢生成
      const options = new Set([calcAnswer]);
      while (options.size < 4) {
        options.add(calcAnswer + Math.floor(Math.random() * 10) - 5);
      }
      const shuffled = [...options].sort(() => Math.random() - 0.5);

      const container = document.getElementById('calcOptions');
      container.innerHTML = '';
      shuffled.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'calc-btn';
        btn.textContent = opt;
        btn.onclick = () => answerCalc(opt, btn);
        container.appendChild(btn);
      });

      calcCurrent++;
    }

    function answerCalc(val, btn) {
      document.querySelectorAll('.calc-btn').forEach(b => b.onclick = null);
      if (val === calcAnswer) {
        calcCorrect++;
        document.getElementById('calcFeedback').textContent = '✅ 正解！';
      } else {
        document.getElementById('calcFeedback').textContent = `❌ 不正解（正解: ${calcAnswer}）`;
      }
      setTimeout(nextCalc, 800);
    }

    // ===== 反応速度テスト =====
    let reactionTimes = [];
    let reactionCount = 3;
    let reactionStart = 0;
    let reactionTimer = null;
    let reactionState = 'idle';

    function setupReaction() {
      reactionTimes = [];
      reactionState = 'idle';
      document.getElementById('reactionArea').className = 'reaction-area';
      document.getElementById('reactionArea').textContent = 'タップしてスタート';
      document.getElementById('reactionTime').textContent = '';
      document.getElementById('reactionStatus').textContent = `残り ${reactionCount} 回`;
    }

    function reactionTap() {
      if (reactionState === 'idle') {
        reactionState = 'waiting';
        document.getElementById('reactionArea').className = 'reaction-area ready';
        document.getElementById('reactionArea').textContent = '待て...';
        document.getElementById('reactionTime').textContent = '';

        const delay = 1500 + Math.random() * 2500;
        reactionTimer = setTimeout(() => {
          reactionState = 'go';
          reactionStart = Date.now();
          document.getElementById('reactionArea').className = 'reaction-area go';
          document.getElementById('reactionArea').textContent = '今！';
        }, delay);

      } else if (reactionState === 'waiting') {
        clearTimeout(reactionTimer);
        reactionState = 'idle';
        document.getElementById('reactionArea').className = 'reaction-area';
        document.getElementById('reactionArea').textContent = 'フライング！もう一度';

      } else if (reactionState === 'go') {
        const elapsed = Date.now() - reactionStart;
        reactionTimes.push(elapsed);
        document.getElementById('reactionTime').textContent = elapsed + 'ms';

        const remaining = reactionCount - reactionTimes.length;
        if (remaining > 0) {
          document.getElementById('reactionStatus').textContent = `残り ${remaining} 回`;
          reactionState = 'idle';
          document.getElementById('reactionArea').className = 'reaction-area';
          document.getElementById('reactionArea').textContent = 'タップしてスタート';
        } else {
          const avg = reactionTimes.reduce((a,b) => a+b, 0) / reactionTimes.length;
          // 200ms以下→満点、500ms以上→0点
          scores.reaction = Math.max(0, Math.min(1, (500 - avg) / 300));
          document.getElementById('reactionStatus').textContent = `平均: ${Math.round(avg)}ms`;
          setTimeout(() => {
            showScreen('screen-balance');
          }, 1000);
        }
      }
    }

    // ===== バランステスト =====
    let balanceTimer  = null;
    let balanceTime   = 5;
    let balanceScore  = 0;
    let balanceSamples = 0;
    let balanceActive = false;

    function startBalance() {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
          if (state === 'granted') runBalance();
        });
      } else {
        runBalance();
      }
    }

    function runBalance() {
      document.getElementById('balanceStartBtn').style.display = 'none';
      balanceTime    = 5;
      balanceScore   = 0;
      balanceSamples = 0;
      balanceActive  = true;
      document.getElementById('balanceTimer').textContent = balanceTime;
      document.getElementById('balanceStatus').textContent = '水平を保ってください！';

      balanceTimer = setInterval(() => {
        balanceTime--;
        document.getElementById('balanceTimer').textContent = balanceTime;
        if (balanceTime <= 0) {
          clearInterval(balanceTimer);
          balanceActive = false;
          scores.balance = balanceSamples > 0
            ? Math.max(0, balanceScore / balanceSamples)
            : 0;
          window.removeEventListener('deviceorientation', balanceHandler);
          setTimeout(showResult, 500);
        }
      }, 1000);

      window.addEventListener('deviceorientation', balanceHandler);
    }

    function balanceHandler(e) {
      if (!balanceActive) return;
      const gamma = e.gamma || 0;
            const beta  = (e.beta  || 0); // 補正なし

      // ボール位置
      const maxOffset = 85;
      const x = Math.max(-maxOffset, Math.min(maxOffset, gamma * 3));
      const y = Math.max(-maxOffset, Math.min(maxOffset, beta  * 3));
      const ball = document.getElementById('balanceBall');
      ball.style.left = (110 + x) + 'px';
      ball.style.top  = (110 + y) + 'px';

      // スコア計算（中心からの距離）
      const dist = Math.sqrt(x*x + y*y);
      const sample = Math.max(0, 1 - dist / maxOffset);
      balanceScore += sample;
      balanceSamples++;
    }

    // ===== 結果 =====
    function showResult() {
      showScreen('screen-result');

      const total = (scores.calc + scores.reaction + scores.balance) / 3;
      const pct   = Math.round(total * 100);

      // キャラクター定義
      const levels = [
        { min: 80, char: '😎', level: 'しらふ',     color: '#2ecc71',
          desc: '素面です！まだまだ飲めます？\nテスト結果は優秀でした！' },
        { min: 60, char: '😊', level: 'ほろ酔い',   color: '#f9ca24',
          desc: 'いい感じに酔っています🍺\nまだ余裕がありそうですね！' },
        { min: 40, char: '🥴', level: 'そこそこ酔い', color: '#f0932b',
          desc: 'だいぶ酔ってきました😵\nそろそろ水を飲みましょう！' },
        { min: 20, char: '😵', level: 'かなり酔い',  color: '#e74c3c',
          desc: '相当酔っています！🚨\nこれ以上の飲酒は控えましょう！' },
        { min: 0,  char: '🤮', level: '泥酔',       color: '#8e44ad',
          desc: '限界突破です！！🆘\n今すぐ飲むのをやめてください！' },
      ];

      const result = levels.find(l => pct >= l.min) || levels[levels.length - 1];

      document.getElementById('resultChar').textContent  = result.char;
      document.getElementById('resultLevel').textContent = result.level;
      document.getElementById('resultLevel').style.color = result.color;
      document.getElementById('resultDesc').textContent  = result.desc;
      document.getElementById('resultScore').textContent =
        `酔い度スコア: ${100 - pct}% ／ ` +
        `計算${Math.round(scores.calc*100)}% ／ ` +
        `反応${Math.round(scores.reaction*100)}% ／ ` +
        `バランス${Math.round(scores.balance*100)}%`;

      const fill = document.getElementById('resultMeterFill');
      fill.style.background = result.color;
      setTimeout(() => {
        fill.style.width = (100 - pct) + '%';
      }, 100);
    }

    function restart() {
      scores = { calc: 0, reaction: 0, balance: 0 };
      document.getElementById('balanceStartBtn').style.display = '';
      document.getElementById('balanceBall').style.left = '110px';
      document.getElementById('balanceBall').style.top  = '110px';
      showScreen('screen-title');
    }
  </script>
</body>
</html>
